<html>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no'>
    <meta name='mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <link rel='icon' type='image/png' sizes='32x32' href='../favicon-32x32.png'>
    <link rel='icon' type='image/png' sizes='96x96' href='../favicon-96x96.png'>
    <link rel='stylesheet' href='../css/common.css'>

    <title>Input Selection (WebGPU)</title>
  </head>
  <body>
    <header>
      <details open>
        <summary>Input Selection (WebGPU)</summary>
        <p>
          This sample demonstrates handling 'select' events generated by
          XRInputSources to create clickable objects in the scene.
          <a class="back" href="./">Back</a>
        </p>
      </details>
    </header>
    <main style='text-align: center;'>
      <p>Click 'Enter XR' to see content</p>
    </main>
    <script type="module">
      import {WebXRButton} from '../js/util/webxr-button.js';
      import {GPUScene} from '../js/render/scenes/scene-gpu.js';
      import {GPURenderer, createWebGPUContext} from '../js/render/core/renderer-gpu.js';
      import {Node} from '../js/render/core/node.js';
      import {Gltf2GPUNode} from '../js/render/nodes/gltf2-gpu.js';
      import {BoxBuilder} from '../js/render/geometry/box-builder.js';
      import {PbrGPUMaterial} from '../js/render/materials/pbr-gpu.js';
      import {Primitive, PrimitiveAttribute} from '../js/render/core/primitive.js';
      import {vec3, mat4} from '../js/render/math/gl-matrix.js';
      import {Ray} from '../js/render/math/ray.js';
      import {Material, RENDER_ORDER} from '../js/render/core/material.js';
      import {DataTexture} from '../js/render/core/texture.js';

      // This library matches XRInputSource profiles to available controller models.
      import { fetchProfile } from 'https://cdn.jsdelivr.net/npm/@webxr-input-profiles/motion-controllers@1.0/dist/motion-controllers.module.js';

      const DEFAULT_PROFILES_PATH = 'https://cdn.jsdelivr.net/npm/@webxr-input-profiles/assets@1.0/dist/profiles';

      const GL = WebGLRenderingContext;

      // Laser texture data, 48x1 RGBA. Represents a "cross section" of the
      // laser beam with a bright core and a feathered edge.
      const LASER_TEXTURE_DATA = new Uint8Array([
        0xff, 0xff, 0xff, 0x01, 0xff, 0xff, 0xff, 0x02, 0xbf, 0xbf, 0xbf, 0x04, 0xcc, 0xcc, 0xcc, 0x05,
        0xdb, 0xdb, 0xdb, 0x07, 0xcc, 0xcc, 0xcc, 0x0a, 0xd8, 0xd8, 0xd8, 0x0d, 0xd2, 0xd2, 0xd2, 0x11,
        0xce, 0xce, 0xce, 0x15, 0xce, 0xce, 0xce, 0x1a, 0xce, 0xce, 0xce, 0x1f, 0xcd, 0xcd, 0xcd, 0x24,
        0xc8, 0xc8, 0xc8, 0x2a, 0xc9, 0xc9, 0xc9, 0x2f, 0xc9, 0xc9, 0xc9, 0x34, 0xc9, 0xc9, 0xc9, 0x39,
        0xc9, 0xc9, 0xc9, 0x3d, 0xc8, 0xc8, 0xc8, 0x41, 0xcb, 0xcb, 0xcb, 0x44, 0xee, 0xee, 0xee, 0x87,
        0xfa, 0xfa, 0xfa, 0xc8, 0xf9, 0xf9, 0xf9, 0xc9, 0xf9, 0xf9, 0xf9, 0xc9, 0xfa, 0xfa, 0xfa, 0xc9,
        0xfa, 0xfa, 0xfa, 0xc9, 0xf9, 0xf9, 0xf9, 0xc9, 0xf9, 0xf9, 0xf9, 0xc9, 0xfa, 0xfa, 0xfa, 0xc8,
        0xee, 0xee, 0xee, 0x87, 0xcb, 0xcb, 0xcb, 0x44, 0xc8, 0xc8, 0xc8, 0x41, 0xc9, 0xc9, 0xc9, 0x3d,
        0xc9, 0xc9, 0xc9, 0x39, 0xc9, 0xc9, 0xc9, 0x34, 0xc9, 0xc9, 0xc9, 0x2f, 0xc8, 0xc8, 0xc8, 0x2a,
        0xcd, 0xcd, 0xcd, 0x24, 0xce, 0xce, 0xce, 0x1f, 0xce, 0xce, 0xce, 0x1a, 0xce, 0xce, 0xce, 0x15,
        0xd2, 0xd2, 0xd2, 0x11, 0xd8, 0xd8, 0xd8, 0x0d, 0xcc, 0xcc, 0xcc, 0x0a, 0xdb, 0xdb, 0xdb, 0x07,
        0xcc, 0xcc, 0xcc, 0x05, 0xbf, 0xbf, 0xbf, 0x04, 0xff, 0xff, 0xff, 0x02, 0xff, 0xff, 0xff, 0x01,
      ]);

      const LASER_LENGTH = 1.0;
      const LASER_DIAMETER = 0.01;
      const LASER_FADE_END = 0.535;
      const LASER_FADE_POINT = 0.5335;

      const LASER_WGSL = `
struct FrameUniforms {
  projectionMatrix: mat4x4f,
  viewMatrix: mat4x4f,
  lightDirection: vec3f,
  _pad0: f32,
  lightColor: vec3f,
  _pad1: f32,
  cameraPosition: vec3f,
  _pad2: f32,
};
@group(0) @binding(0) var<uniform> frame: FrameUniforms;

struct ModelUniforms {
  modelMatrix: mat4x4f,
};
@group(1) @binding(0) var<uniform> model: ModelUniforms;

struct MaterialUniforms {
  laserColor: vec4f,
};
@group(2) @binding(0) var<uniform> material: MaterialUniforms;
@group(2) @binding(1) var materialSampler: sampler;
@group(2) @binding(2) var laserTexture: texture_2d<f32>;

struct VertexInput {
  @location(0) position: vec3f,
  @location(3) texcoord: vec2f,
};

struct VertexOutput {
  @builtin(position) position: vec4f,
  @location(0) vTexCoord: vec2f,
};

@vertex
fn vs_main(input: VertexInput) -> VertexOutput {
  var output: VertexOutput;
  output.vTexCoord = input.texcoord;
  output.position = frame.projectionMatrix * frame.viewMatrix * model.modelMatrix * vec4f(input.position, 1.0);
  return output;
}

const fadePoint: f32 = ${LASER_FADE_POINT};
const fadeEnd: f32 = ${LASER_FADE_END};

@fragment
fn fs_main(input: VertexOutput) -> @location(0) vec4f {
  let uv = input.vTexCoord;
  let front_fade_factor = 1.0 - clamp(1.0 - (uv.y - fadePoint) / (1.0 - fadePoint), 0.0, 1.0);
  let back_fade_factor = clamp((uv.y - fadePoint) / (fadeEnd - fadePoint), 0.0, 1.0);
  let color = material.laserColor * textureSample(laserTexture, materialSampler, uv);
  let opacity = color.a * front_fade_factor * back_fade_factor;
  return vec4f(color.rgb * opacity, opacity);
}
`;

      class LaserGPUMaterial extends Material {
        constructor() {
          super();
          this.renderOrder = RENDER_ORDER.ADDITIVE;
          this.state.cullFace = false;
          this.state.blend = true;
          this.state.blendFuncSrc = GL.ONE;
          this.state.blendFuncDst = GL.ONE;
          this.state.depthMask = false;

          this.laser = this.defineSampler('diffuse');
          this.laser.texture = new DataTexture(LASER_TEXTURE_DATA, 48, 1);
          this.laserColor = this.defineUniform('laserColor', [1.0, 1.0, 1.0, 0.25]);
        }

        get materialName() { return 'LASER_GPU'; }
        get vertexSource() { return null; }
        get fragmentSource() { return null; }
        get wgslSource() { return LASER_WGSL; }
        getProgramDefines(renderPrimitive) { return {}; }
      }

      function createLaserMesh(renderer) {
        let lr = LASER_DIAMETER * 0.5;
        let ll = LASER_LENGTH;

        let laserVerts = new Float32Array([
        // X    Y     Z     U    V
          0.0,  lr,  0.0,  0.0, 1.0,
          0.0,  lr,  -ll,  0.0, 0.0,
          0.0, -lr,  0.0,  1.0, 1.0,
          0.0, -lr,  -ll,  1.0, 0.0,

           lr, 0.0,  0.0,  0.0, 1.0,
           lr, 0.0,  -ll,  0.0, 0.0,
          -lr, 0.0,  0.0,  1.0, 1.0,
          -lr, 0.0,  -ll,  1.0, 0.0,

          0.0, -lr,  0.0,  0.0, 1.0,
          0.0, -lr,  -ll,  0.0, 0.0,
          0.0,  lr,  0.0,  1.0, 1.0,
          0.0,  lr,  -ll,  1.0, 0.0,

          -lr, 0.0,  0.0,  0.0, 1.0,
          -lr, 0.0,  -ll,  0.0, 0.0,
           lr, 0.0,  0.0,  1.0, 1.0,
           lr, 0.0,  -ll,  1.0, 0.0,
        ]);
        let laserIndices = new Uint16Array([
          0, 1, 2, 1, 3, 2,
          4, 5, 6, 5, 7, 6,
          8, 9, 10, 9, 11, 10,
          12, 13, 14, 13, 15, 14,
        ]);

        let vertexBuffer = renderer.createRenderBuffer(laserVerts, 'vertex');
        let indexBuffer = renderer.createRenderBuffer(laserIndices, 'index');

        let attribs = [
          new PrimitiveAttribute('POSITION', vertexBuffer, 3, 5126, 20, 0),
          new PrimitiveAttribute('TEXCOORD_0', vertexBuffer, 2, 5126, 20, 12),
        ];

        let primitive = new Primitive(attribs, laserIndices.length);
        primitive.setIndexBuffer(indexBuffer);

        let material = new LaserGPUMaterial();
        let renderPrimitive = renderer.createRenderPrimitive(primitive, material);
        let meshNode = new Node();
        meshNode.addRenderPrimitive(renderPrimitive);
        return meshNode;
      }

      // XR globals.
      let xrButton = null;
      let xrRefSpace = null;

      // WebGPU globals.
      let device = null;
      let renderer = null;
      let binding = null;
      let layer = null;

      // Scene globals.
      let scene = new GPUScene();
      scene.addNode(new Gltf2GPUNode({url: '../media/gltf/cube-room/cube-room.gltf'}));
      scene.standingStats(true);

      let boxes = [];
      let currently_selected_boxes = [null, null];
      let currently_grabbed_boxes = [null, null];
      let controllers = {};
      let lasers = [];
      let activeLasers = 0;

      async function initXR() {
        if (!navigator.gpu) {
          console.error('WebGPU is not supported.');
          return;
        }

        device = await createWebGPUContext({xrCompatible: true});
        if (!device) {
          return;
        }

        xrButton = new WebXRButton({
          onRequestSession: onRequestSession,
          onEndSession: onEndSession
        });
        document.querySelector('header').appendChild(xrButton.domElement);

        if (navigator.xr) {
          navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
            xrButton.enabled = supported;
          });
        }
      }

      function createBoxPrimitive() {
        let boxBuilder = new BoxBuilder();
        boxBuilder.pushCube([0, 0, 0], 0.4);
        let stream = boxBuilder.primitiveStream;

        let vertexBuffer = renderer.createRenderBuffer(new Float32Array(stream._vertices), 'vertex');
        let indexBuffer = renderer.createRenderBuffer(new Uint16Array(stream._indices), 'index');

        let attribs = [
          new PrimitiveAttribute('POSITION', vertexBuffer, 3, 5126, 32, 0),
          new PrimitiveAttribute('TEXCOORD_0', vertexBuffer, 2, 5126, 32, 12),
          new PrimitiveAttribute('NORMAL', vertexBuffer, 3, 5126, 32, 20),
        ];

        let primitive = new Primitive(attribs, stream._indices.length);
        primitive.setIndexBuffer(indexBuffer);
        if (stream._min) {
          primitive.setBounds(stream._min, stream._max);
        }
        return primitive;
      }

      function onRequestSession() {
        return navigator.xr.requestSession('immersive-vr', {
          requiredFeatures: ['local-floor', 'webgpu'],
        }).then(onSessionStarted);
      }

      function onSessionStarted(session) {
        xrButton.setSession(session);

        session.addEventListener('end', onSessionEnded);

        session.addEventListener('selectstart', onSelectStart);
        session.addEventListener('selectend', onSelectEnd);
        session.addEventListener('select', onSelect);

        session.addEventListener('squeezestart', onSqueezeStart);
        session.addEventListener('squeezeend', onSqueezeEnd);
        session.addEventListener('squeeze', onSqueeze);

        // Load controller models when input sources are connected.
        session.addEventListener('inputsourceschange', (event) => {
          for (let inputSource of event.added) {
            if (inputSource.targetRayMode == 'tracked-pointer') {
              fetchProfile(inputSource, DEFAULT_PROFILES_PATH).then(({profile, assetPath}) => {
                let key = inputSource.profiles[0] + '_' + inputSource.handedness;
                if (!controllers[key]) {
                  let controllerNode = new Gltf2GPUNode({url: assetPath});
                  controllerNode.visible = false;
                  controllers[key] = controllerNode;
                  scene.addNode(controllerNode);
                }
              });
            }
          }
        });

        // Create the XRGPUBinding.
        binding = new XRGPUBinding(session, device);

        let colorFormat = binding.getPreferredColorFormat();

        layer = binding.createProjectionLayer({
          colorFormat: colorFormat,
          depthStencilFormat: 'depth24plus',
        });

        session.updateRenderState({ layers: [layer] });

        renderer = new GPURenderer(device, colorFormat);
        scene.setRenderer(renderer);

        // Create the box primitive and add boxes to the scene.
        let boxPrimitive = createBoxPrimitive();

        function addBox(x, y, z, r, g, b) {
          let boxMaterial = new PbrGPUMaterial();
          boxMaterial.baseColorFactor.value = [r, g, b, 1.0];
          let boxRenderPrimitive = renderer.createRenderPrimitive(boxPrimitive, boxMaterial);
          let boxNode = new Node();
          boxNode.addRenderPrimitive(boxRenderPrimitive);
          boxNode.selectable = true;
          boxes.push({
            node: boxNode,
            renderPrimitive: boxRenderPrimitive,
            position: [x, y, z],
            scale: [1, 1, 1],
          });
          scene.addNode(boxNode);
        }

        addBox(-1.0, 1.6, -1.3, 1.0, 0.0, 0.0);
        addBox(0.0, 1.7, -1.5, 0.0, 1.0, 0.0);
        addBox(1.0, 1.6, -1.3, 0.0, 0.0, 1.0);

        session.requestReferenceSpace('local-floor').then((refSpace) => {
          xrRefSpace = refSpace;
          session.requestAnimationFrame(onXRFrame);
        });
      }

      function onSelectStart(ev) {
        let targetRayPose = ev.frame.getPose(ev.inputSource.targetRaySpace, xrRefSpace);
        if (!targetRayPose) {
          return;
        }

        let hitResult = scene.hitTest(targetRayPose.transform);
        if (hitResult) {
          for (let box of boxes) {
            if (hitResult.node == box.node) {
              let i = (ev.inputSource.handedness == "left") ? 0 : 1;
              currently_selected_boxes[i] = box;
              box.scale = [1.25, 1.25, 1.25];
              box.selected = false;
            }
          }
        }
      }

      function onSelectEnd(ev) {
        let i = (ev.inputSource.handedness == "left") ? 0 : 1;
        let currently_selected_box = currently_selected_boxes[i];
        if (currently_selected_box != null) {
          if (currently_selected_box.selected) {
            vec3.add(currently_selected_box.scale, currently_selected_box.scale, [0.25, 0.25, 0.25]);
            currently_selected_box.selected = false;
          } else {
            currently_selected_box.scale = [0.75, 0.75, 0.75];
          }
          currently_selected_boxes[i] = null;
        }
      }

      function onSelect(ev) {
        let i = (ev.inputSource.handedness == "left") ? 0 : 1;
        let currently_selected_box = currently_selected_boxes[i];
        if (currently_selected_box != null) {
          let uniforms = currently_selected_box.renderPrimitive.uniforms;
          uniforms.baseColorFactor.value = [Math.random(), Math.random(), Math.random(), 1.0];
          vec3.add(currently_selected_box.scale, currently_selected_box.scale, [-0.5, -0.5, -0.5]);
          currently_selected_box.selected = true;
        }
      }

      function onSqueezeStart(ev) {
        let targetRayPose = ev.frame.getPose(ev.inputSource.targetRaySpace, xrRefSpace);
        if (!targetRayPose) {
          return;
        }

        let hitResult = scene.hitTest(targetRayPose.transform);
        if (hitResult) {
          for (let box of boxes) {
            if (hitResult.node == box.node && !box.grabbed) {
              let i = (ev.inputSource.handedness == "left") ? 0 : 1;
              currently_grabbed_boxes[i] = box;
              box.scale = [0.1, 0.1, 0.1];
              box.originalPos = box.position;
              box.grabbed = true;
            }
          }
        }
      }

      function onSqueezeEnd(ev) {
        let i = (ev.inputSource.handedness == "left") ? 0 : 1;
        let currently_grabbed_box = currently_grabbed_boxes[i];
        if (currently_grabbed_box != null && currently_grabbed_box.grabbed) {
          vec3.add(currently_grabbed_box.scale, currently_grabbed_box.scale, [1, 1, 1]);
          currently_grabbed_box.position = currently_grabbed_box.originalPos;
          currently_grabbed_box.grabbed = false;
          currently_grabbed_boxes[i] = null;
        }
      }

      function onSqueeze(ev) {
        let i = (ev.inputSource.handedness == "left") ? 0 : 1;
        let currently_grabbed_box = currently_grabbed_boxes[i];
        if (currently_grabbed_box != null && currently_grabbed_box.grabbed) {
          let uniforms = currently_grabbed_box.renderPrimitive.uniforms;
          uniforms.baseColorFactor.value = [Math.random(), Math.random(), Math.random(), 1.0];
        }
      }

      function onEndSession(session) {
        session.end();
      }

      function onSessionEnded(event) {
        xrButton.setSession(null);
        binding = null;
        layer = null;
        renderer = null;
      }

      function onXRFrame(time, frame) {
        let session = frame.session;
        let pose = frame.getViewerPose(xrRefSpace);

        scene.startFrame();

        session.requestAnimationFrame(onXRFrame);

        // Hide all controllers and lasers, then show the active ones.
        for (let key in controllers) {
          controllers[key].visible = false;
        }
        for (let laser of lasers) {
          laser.visible = false;
        }
        activeLasers = 0;

        // Update controllers, lasers, and check if we can move grabbed objects.
        for (let inputSource of frame.session.inputSources) {
          // Position the controller model.
          if (inputSource.gripSpace) {
            let gripPose = frame.getPose(inputSource.gripSpace, xrRefSpace);
            if (gripPose) {
              let key = inputSource.profiles[0] + '_' + inputSource.handedness;
              if (controllers[key]) {
                controllers[key].matrix = gripPose.transform.matrix;
                controllers[key].visible = true;
              }
            }
          }

          let targetRayPose = frame.getPose(inputSource.targetRaySpace, xrRefSpace);
          if (!targetRayPose) {
            continue;
          }

          // Show laser pointer along target ray.
          if (inputSource.targetRayMode == 'tracked-pointer') {
            let laser;
            if (activeLasers < lasers.length) {
              laser = lasers[activeLasers];
            } else {
              laser = createLaserMesh(renderer);
              lasers.push(laser);
              scene.addNode(laser);
            }
            laser.matrix = targetRayPose.transform.matrix;
            laser.visible = true;
            activeLasers++;
          }

          let i = (inputSource.handedness == "left") ? 0 : 1;
          if (currently_grabbed_boxes[i] != null && currently_grabbed_boxes[i].grabbed) {
            let targetRay = new Ray(targetRayPose.transform.matrix);
            let grabDistance = 0.1;
            let grabPos = vec3.fromValues(
              targetRay.origin[0],
              targetRay.origin[1],
              targetRay.origin[2]
            );
            vec3.add(grabPos, grabPos, [
              targetRay.direction[0] * grabDistance,
              targetRay.direction[1] * grabDistance + 0.06,
              targetRay.direction[2] * grabDistance,
            ]);
            currently_grabbed_boxes[i].position = grabPos;
          }
        }

        // Update the matrix for each box.
        for (let box of boxes) {
          let node = box.node;
          mat4.identity(node.matrix);
          mat4.translate(node.matrix, node.matrix, box.position);
          mat4.rotateX(node.matrix, node.matrix, time/1000);
          mat4.rotateY(node.matrix, node.matrix, time/1500);
          mat4.scale(node.matrix, node.matrix, box.scale);
        }

        if (pose) {
          scene.drawXRFrame(frame, pose, binding, layer);
        }

        scene.endFrame();
      }

      // Start the XR application.
      initXR();
    </script>
  </body>
</html>
